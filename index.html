<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Healing with Greg Barris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { overflow: hidden; height: 100vh; }

    #hero {
      width: 100vw; height: 100vh;
      background-image: url('images/Deep-Healing-BG.webp');
      background-size: cover;
      background-position: center top;
      position: relative;
    }
    #hero::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(4,10,6,0.35) 100%);
      pointer-events: none;
    }

    .sticker {
      position: absolute; top: 18%; left: 8%;
      width: 300px; height: 300px;
      transform: rotate(-8deg) scale(0);
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .sticker-ring {
      position: absolute; inset: -16px; border-radius: 50%;
      border: 1px dashed rgba(200,134,10,0.45);
      animation: ring-spin 22s linear infinite;
    }
    @keyframes ring-spin { to { transform: rotate(360deg); } }

    .sticker-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: conic-gradient(from 0deg, #b07008, #f5d98a, #e8b84b, #c8860a, #7a4e04, #c8860a, #f0cc70, #b07008);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 3px 12px rgba(200,134,10,0.4), inset 0 1px 3px rgba(255,255,255,0.28);
      animation: breathe 3.8s ease-in-out infinite;
      position: relative;
    }
    .sticker-inner::before {
      content: ''; position: absolute; inset: 8px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 3px 12px rgba(200,134,10,0.4); transform: scale(1); }
      50%      { box-shadow: 0 16px 56px rgba(0,0,0,0.6), 0 6px 24px rgba(200,134,10,0.6); transform: scale(1.04); }
    }

    .sticker-text { display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 1; }
    .sticker-top  { font-family: 'Crimson Pro', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: #251000; opacity: 0.78; }
    .sticker-main { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 600; color: #180e00; text-align: center; line-height: 1.0; }
    .sticker-sub  { font-family: 'Crimson Pro', serif; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #251000; opacity: 0.6; }

    .scroll-hint {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; pointer-events: none;
    }
    .scroll-hint span { font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--cream); opacity: 0.45; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
    .scroll-line { width: 1px; height: 44px; background: linear-gradient(to bottom, var(--gold-light), transparent); animation: line-drop 2.4s ease-in-out infinite; }
    @keyframes line-drop {
      0%   { transform: scaleY(0); transform-origin: top;    opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top;    opacity: 1; }
      51%  { transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }

    @media (max-width: 800px) {
      .sticker { width: 180px; height: 180px; left: 5%; top: 16%; }
      .sticker-main { font-size: 28px; }
    }
  </style>
</head>
<body>

  <nav id="main-nav">
    <ul class="nav-links">
      <li><a href="book.html">The Book</a></li>
      <li><a href="podcast.html">Podcast</a></li>
      <li><a href="events.html">Live Events</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="https://YOUR-SHOPIFY-URL.myshopify.com" target="_blank">Shop</a></li>
      <li>
        <button class="nav-search" aria-label="Search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </li>
    </ul>
  </nav>

  <section id="hero">
    <a href="book.html" class="sticker" id="sticker">
      <div class="sticker-ring"></div>
      <div class="sticker-inner">
        <div class="sticker-text">
          <span class="sticker-top">Now Available</span>
          <span class="sticker-main">Get<br>the Book</span>
          <span class="sticker-sub">Order Today</span>
        </div>
      </div>
    </a>


  </section>

  <script>
    gsap.to('#main-nav',    { opacity: 1, duration: 1.4, delay: 0.3, ease: 'power2.out' });
    gsap.to('#sticker',     { scale: 1,   duration: 1.1, delay: 1.1, ease: 'elastic.out(1, 0.45)' });
  </script>
</body>
</html>
