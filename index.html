<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Healing with Greg Barris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { overflow: hidden; height: 100vh; }

    #hero {
      width: 100vw; height: 100vh;
      background-image: url('images/Deep-Healing-BG.webp');
      background-size: cover;
      background-position: center top;
      position: relative;
    }
    @media (max-width: 800px) {
      #hero { background-image: url('images/deep-healing-bg-mobile.webp'); }
    }
    #hero::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(4,10,6,0.35) 100%);
      pointer-events: none;
    }

    /* STICKER — desktop */
    .sticker {
      position: absolute;
      top: 18%; left: 8%;
      width: 300px; height: 300px;
      transform: rotate(-8deg) scale(0);
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .sticker-ring {
      position: absolute; inset: -16px; border-radius: 50%;
      border: 1px dashed rgba(200,134,10,0.45);
      animation: ring-spin 22s linear infinite;
    }
    @keyframes ring-spin { to { transform: rotate(360deg); } }
    .sticker-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: conic-gradient(from 0deg, #b07008, #f5d98a, #e8b84b, #c8860a, #7a4e04, #c8860a, #f0cc70, #b07008);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 3px 12px rgba(200,134,10,0.4), inset 0 1px 3px rgba(255,255,255,0.28);
      animation: breathe 3.8s ease-in-out infinite;
      position: relative;
    }
    .sticker-inner::before {
      content: ''; position: absolute; inset: 8px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 3px 12px rgba(200,134,10,0.4); transform: scale(1); }
      50%      { box-shadow: 0 16px 56px rgba(0,0,0,0.6), 0 6px 24px rgba(200,134,10,0.6); transform: scale(1.04); }
    }
    .sticker-text { display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 1; }
    .sticker-top  { font-family: 'Crimson Pro', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: #251000; opacity: 0.78; }
    .sticker-main { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 600; color: #180e00; text-align: center; line-height: 1.0; }
    .sticker-sub  { font-family: 'Crimson Pro', serif; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #251000; opacity: 0.6; }

    /* ROTATING QUOTES */
    .quote-rotator {
      position: absolute;
      bottom: 52px; left: 52px;
      max-width: 520px;
      opacity: 0; z-index: 10;
    }
    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(17px, 2vw, 24px);
      font-weight: 300; font-style: italic;
      line-height: 1.45; color: var(--cream);
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }
    .quote-text::before { content: '\201C'; color: var(--gold); }
    .quote-text::after  { content: '\201D'; color: var(--gold); }
    .quote-attr {
      margin-top: 10px; font-size: 10px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); opacity: 0.7;
      text-shadow: 0 1px 8px rgba(0,0,0,0.7);
    }

    /* MOBILE overrides */
    @media (max-width: 800px) {
      /* Sticker: smaller, bottom-right */
      .sticker {
        top: auto; left: auto;
        bottom: 5%; right: 5%;
        width: 130px; height: 130px;
      }
      .sticker-ring { inset: -8px; }
      .sticker-text { gap: 3px; }
      .sticker-top  { font-size: 7px; }
      .sticker-main { font-size: 20px; line-height: 1.05; }
      .sticker-sub  { font-size: 6px; }
      /* Quotes: keep left, avoid sticker */
      .quote-rotator { bottom: 28px; left: 20px; right: 165px; }
      .quote-text { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- MOBILE NAV OVERLAY -->
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <ul class="mobile-nav-links">
      <li><a href="book.html">The Book</a></li>
      <li><a href="podcast.html">Podcast</a></li>
      <li><a href="events.html">Live Events</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="https://YOUR-SHOPIFY-URL.myshopify.com" target="_blank">Shop</a></li>
    </ul>
  </div>

  <nav id="main-nav">
    <ul class="nav-links">
      <li><a href="book.html">The Book</a></li>
      <li><a href="podcast.html">Podcast</a></li>
      <li><a href="events.html">Live Events</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="https://YOUR-SHOPIFY-URL.myshopify.com" target="_blank">Shop</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <section id="hero">
    <a href="book.html" class="sticker" id="sticker">
      <div class="sticker-ring"></div>
      <div class="sticker-inner">
        <div class="sticker-text">
          <span class="sticker-top">Now Available</span>
          <span class="sticker-main">Get<br>the Book</span>
          <span class="sticker-sub">Order Today</span>
        </div>
      </div>
    </a>

    <div class="quote-rotator" id="quote-rotator">
      <p class="quote-text" id="q-text">All words are magik words. Isn't that terrifying?</p>
      <p class="quote-attr" id="q-attr">— Deep Healing</p>
    </div>
  </section>

  <script>
    gsap.to('#main-nav', { opacity: 1, duration: 1.4, delay: 0.3, ease: 'power2.out' });
    gsap.to('#sticker',  { scale: 1,   duration: 1.1, delay: 1.1, ease: 'elastic.out(1, 0.45)' });

    // Hamburger
    const hamburger   = document.getElementById('hamburger');
    const mobileNav   = document.getElementById('mobile-nav');
    const mobileClose = document.getElementById('mobile-nav-close');
    hamburger.addEventListener('click', () => mobileNav.classList.add('open'));
    mobileClose.addEventListener('click', () => mobileNav.classList.remove('open'));
    mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileNav.classList.remove('open')));

    // Rotating quotes
    const quotes = [
      "All words are magik words. Isn't that terrifying?",
      "Reality is a state of brokenness. That's just how it works.",
      "You ARE the apocalypse.",
      "This will end, and you're not gonna die.",
      "You are so very important. Without you there is no we.",
      "Squeeze. That. Burrito.",
      "You are not your dead phone. You are not your mother's Netflix password.",
      "What you are doing is right. What you are doing is interesting.",
    ];

    const qText    = document.getElementById('q-text');
    const qAttr    = document.getElementById('q-attr');
    const rotator  = document.getElementById('quote-rotator');
    let qIndex = 0;

    gsap.to(rotator, { opacity: 1, duration: 1.2, delay: 2.8, ease: 'power2.out' });

    function nextQuote() {
      gsap.to([qText, qAttr], {
        opacity: 0, y: -6, duration: 0.45, ease: 'power2.in',
        onComplete: () => {
          qIndex = (qIndex + 1) % quotes.length;
          qText.textContent = quotes[qIndex];
          gsap.fromTo([qText, qAttr],
            { opacity: 0, y: 10 },
            { opacity: 1, y: 0, duration: 0.65, ease: 'power2.out', stagger: 0.12 }
          );
        }
      });
    }

    setInterval(nextQuote, 5000);
  </script>
</body>
</html>
