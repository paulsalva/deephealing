<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Events — Deep Healing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    .events-hero {
      flex: 1;
      background: var(--forest-deep);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .events-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      padding: 0 52px;
    }

    /* Image placeholder left */
    .events-img {
      aspect-ratio: 3/4;
      max-height: 65vh;
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border: 1px solid rgba(200,134,10,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(200,134,10,0.28);
      font-size: 13px;
      letter-spacing: 0.1em;
      font-family: 'Crimson Pro', serif;
      opacity: 0;
    }

    /* Right side copy */
    .events-copy { display: flex; flex-direction: column; align-items: flex-start; }

    .events-label {
      font-size: 10px; letter-spacing: 0.36em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 22px; opacity: 0;
    }
    .events-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 5.5vw, 84px);
      font-weight: 300; font-style: italic;
      line-height: 0.92; color: var(--cream);
      opacity: 0; margin-bottom: 36px;
    }
    .events-divider {
      width: 56px; height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      margin-bottom: 28px; opacity: 0;
    }
    .events-body {
      font-size: 17px; font-weight: 300; line-height: 1.7;
      color: var(--cream-dim); max-width: 380px;
      opacity: 0; margin-bottom: 32px;
    }
    .coming-soon-badge {
      display: inline-block; padding: 12px 36px;
      border: 1px solid rgba(200,134,10,0.4);
      color: var(--gold); font-size: 10px;
      letter-spacing: 0.36em; text-transform: uppercase;
      opacity: 0; margin-bottom: 28px;
    }
    .notify-form { display: flex; opacity: 0; }
    .notify-form input {
      padding: 13px 20px; width: 220px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,134,10,0.25); border-right: none;
      color: var(--cream); font-family: 'Crimson Pro', serif;
      font-size: 15px; outline: none;
    }
    .notify-form input::placeholder { color: var(--cream-dim); opacity: 0.4; }
    .notify-form button {
      padding: 13px 22px; background: var(--gold);
      border: 1px solid var(--gold); color: var(--forest-deep);
      font-family: 'Crimson Pro', serif; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s; white-space: nowrap;
    }
    .notify-form button:hover { background: var(--gold-light); }

    @media (max-width: 800px) {
      body { overflow-y: auto; height: auto; }
      .events-hero { padding: 100px 0 60px; }
      .events-layout { grid-template-columns: 1fr; gap: 40px; padding: 0 24px; }
      .events-img { max-height: 280px; aspect-ratio: 16/9; }
      .notify-form input { width: 160px; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="close-btn" id="close-btn" aria-label="Back to home">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </a>

  <!-- MOBILE NAV OVERLAY -->
  <div class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <ul class="mobile-nav-links">
      <li><a href="book.html">The Book</a></li>
      <li><a href="podcast.html">Podcast</a></li>
      <li><a href="events.html" class="active">Live Events</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="https://YOUR-SHOPIFY-URL.myshopify.com" target="_blank">Shop</a></li>
    </ul>
  </div>

  <nav id="main-nav" class="interior">
    <ul class="nav-links">
      <li><a href="book.html">The Book</a></li>
      <li><a href="podcast.html">Podcast</a></li>
      <li><a href="events.html" class="active">Live Events</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="https://YOUR-SHOPIFY-URL.myshopify.com" target="_blank">Shop</a></li>
      <li>
        <button class="nav-search" aria-label="Search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="events-hero">
    <div class="events-layout">

      <!-- LEFT: image placeholder -->
      <div class="events-img" id="ei">Photo / Promo Image</div>

      <!-- RIGHT: copy -->
      <div class="events-copy">
        <span class="events-label"  id="el">Live Events</span>
        <h1  class="events-title"   id="et">Catch<br>Greg Live</h1>
        <div class="events-divider" id="ed"></div>
        <p   class="events-body"    id="eb">Tour dates and live event details are on their way. Sign up below to be the first to know.</p>
        <div class="coming-soon-badge" id="cs">Coming Soon</div>
        <div class="notify-form" id="nf">
          <input type="email" placeholder="your@email.com" />
          <button type="button">Notify Me</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    gsap.to('#main-nav', { opacity: 1, duration: 1.2, delay: 0.2, ease: 'power2.out' });
    gsap.to('#close-btn', { opacity: 0.6, duration: 1.0, delay: 0.6, ease: 'power2.out' });
    const hamburger   = document.getElementById('hamburger');
    const mobileNav   = document.getElementById('mobile-nav');
    const mobileClose = document.getElementById('mobile-nav-close');
    hamburger.addEventListener('click', () => mobileNav.classList.add('open'));
    mobileClose.addEventListener('click', () => mobileNav.classList.remove('open'));
    mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileNav.classList.remove('open')));
    gsap.set(['#el','#et','#eb'], { y: 20 });
    const tl = gsap.timeline({ delay: 0.5 });
    tl.to('#ei', { opacity: 1,       duration: 0.9,  ease: 'power2.out' })
      .to('#el', { opacity: 1, y: 0, duration: 0.7,  ease: 'power3.out' }, '-=0.5')
      .to('#et', { opacity: 1, y: 0, duration: 0.9,  ease: 'power3.out' }, '-=0.4')
      .to('#ed', { opacity: 1,       duration: 0.6,  ease: 'power2.out' }, '-=0.3')
      .to('#eb', { opacity: 1, y: 0, duration: 0.8,  ease: 'power3.out' }, '-=0.3')
      .to('#cs', { opacity: 1,       duration: 0.6,  ease: 'power2.out' }, '-=0.2')
      .to('#nf', { opacity: 1,       duration: 0.6,  ease: 'power2.out' }, '-=0.1');
  </script>
</body>
</html>
